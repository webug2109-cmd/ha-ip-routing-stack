apiVersion: apps/v1
kind: Deployment
metadata:
  name: ip-lookup-api
  labels:
    app: ip-lookup
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ip-lookup
  template:
    metadata:
      labels:
        app: ip-lookup
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: api
        image: ipinfo-mock:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /metrics
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /metrics
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
